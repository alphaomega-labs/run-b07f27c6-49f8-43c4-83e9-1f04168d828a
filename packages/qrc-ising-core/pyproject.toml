[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "omegaxiv-qrc-ising-core"
version = "0.1.0"
description = "Reusable QRC-Ising simulation and symbolic validation APIs extracted from omegaXiv deliverables."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.26,<3",
  "sympy>=1.12,<2",
]
license = { text = "Proprietary" }
authors = [
  { name = "omegaXiv Packaging" }
]

[project.urls]
Repository = "https://omegaxiv.example/research"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
